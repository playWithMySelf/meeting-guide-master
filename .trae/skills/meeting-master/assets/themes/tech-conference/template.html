<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX汇报</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00d4ff',
                        secondary: '#7c3aed',
                        accent: '#f59e0b',
                        success: '#10b981',
                        warning: '#f97316',
                        dark: '#0a0a0f',
                        'dark-card': '#12121a',
                        'dark-border': '#1e1e2e',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #0a0a0f;
            color: #e2e8f0;
        }

        /*  subtle 点阵背景 */
        .grid-bg {
            background:
                radial-gradient(ellipse at 0% 0%, rgba(0, 212, 255, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 100% 0%, rgba(124, 58, 237, 0.12) 0%, transparent 40%),
                radial-gradient(ellipse at 100% 100%, rgba(0, 212, 255, 0.08) 0%, transparent 35%),
                radial-gradient(ellipse at 0% 100%, rgba(124, 58, 237, 0.1) 0%, transparent 35%),
                linear-gradient(135deg, #0d0d14 0%, #0a0a0f 25%, #12121a 50%, #0a0a0f 75%, #0d0d14 100%);
            background-size: 40px 40px;
        }

        /* 玻璃效果 - 深色模式 */
        .glass-dark {
            background: rgba(18, 18, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        /* 霓虹发光效果 */
        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(0, 212, 255, 0.1);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5), 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .neon-border {
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.1), inset 0 0 10px rgba(0, 212, 255, 0.05);
        }

        /* 导航链接 */
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link:hover {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* 卡片样式 */
        .tech-card {
            background: linear-gradient(145deg, rgba(18, 18, 26, 0.9) 0%, rgba(30, 30, 46, 0.6) 100%);
            border: 1px solid rgba(0, 212, 255, 0.15);
            transition: all 0.4s ease;
        }

        .tech-card:hover {
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15), 0 10px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(-4px);
        }

        /* 顶部发光边框 */
        .glow-top {
            position: relative;
            overflow: hidden;
        }

        .glow-top::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, #7c3aed, transparent);
            animation: glow-scan 3s linear infinite;
        }

        @keyframes glow-scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 照片画廊 */
        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            transition: all 0.4s ease;
        }

        .photo-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .photo-item:hover::before {
            opacity: 1;
        }

        .photo-item:hover {
            transform: scale(1.02);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .photo-item img {
            transition: transform 0.4s ease;
        }

        .photo-item:hover img {
            transform: scale(1.1);
        }

        /* 音频卡片 */
        .audio-card {
            background: linear-gradient(145deg, rgba(18, 18, 26, 0.95) 0%, rgba(30, 30, 46, 0.7) 100%);
            border: 1px solid rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
        }

        .audio-card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.1);
        }

        /* 展开按钮 */
        .expand-btn {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
        }

        .expand-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
        }

        /* 时间线 */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00d4ff;
            border: 2px solid #0a0a0f;
            box-shadow: 0 0 0 2px #00d4ff, 0 0 15px rgba(0, 212, 255, 0.5);
        }

        /* 灯箱 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
        }

        /* 折叠内容 */
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .collapsible-content.expanded {
            max-height: 5000px;
        }

        /* 风险等级 */
        .risk-high {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(239, 68, 68, 0.05) 100%);
            border-left: 4px solid #ef4444;
        }

        .risk-medium {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.1) 0%, rgba(249, 115, 22, 0.05) 100%);
            border-left: 4px solid #f97316;
        }

        .risk-low {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%);
            border-left: 4px solid #f59e0b;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease forwards;
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .section {
            opacity: 0;
            transform: translateY(30px);
        }

        .section.visible {
            animation: fadeInUp 0.8s ease forwards;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00d4ff, #7c3aed);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00d4ff, #a855f7);
        }

        /* 音频播放器样式覆盖 */
        audio {
            filter: invert(1) hue-rotate(180deg);
            border-radius: 8px;
        }

        /* 标签样式 */
        .tech-tag {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        /* 按钮样式 */
        .tech-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }

        .tech-btn:hover {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        /* 渐变文字 */
        .gradient-text {
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 50%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="tech-bg grid-bg min-h-screen">
    <!-- 固定顶部导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-dark border-b border-cyan-500/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center neon-border pulse-glow">
                        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <span class="text-lg font-semibold text-white hidden sm:block neon-text" id="nav-brand">会议总览</span>
                </div>
                <div class="flex space-x-6" id="nav-links">
                    <!-- 由JS动态渲染 -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Section 1: 会议概览 -->
    <section id="overview" class="pt-24 pb-16 section">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- 顶部横幅 -->
            <div class="text-center mb-12">
                <div class="inline-block mb-4">
                    <span class="tech-tag px-4 py-1 rounded-full text-sm font-medium">TECH CONFERENCE</span>
                </div>
                <h1 id="page-title" class="text-4xl md:text-6xl font-bold mb-4 gradient-text neon-text"></h1>
                <p id="page-subtitle" class="text-xl text-gray-400 font-medium"></p>
                <p id="page-organizers" class="text-sm text-gray-500 mt-2"></p>
            </div>

            <!-- 元信息条 -->
            <div class="flex flex-wrap justify-center items-center gap-6 mb-12 text-gray-300" id="meta-info">
                <!-- 由JS动态渲染 -->
            </div>

            <!-- 核心摘要卡片组 -->
            <div class="grid md:grid-cols-3 gap-6">
                <!-- 会议议题卡片 -->
                <div class="tech-card glow-top rounded-xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="w-12 h-12 rounded-lg flex items-center justify-center mr-3 neon-border">
                            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                            </svg>
                        </div>
                        <h3 class="text-lg font-bold text-white">会议议题</h3>
                    </div>
                    <ul class="space-y-3 text-gray-300" id="meeting-topics">
                        <!-- 由JS动态渲染 -->
                    </ul>
                </div>

                <!-- 演讲人信息卡片 -->
                <div class="tech-card glow-top rounded-xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="w-12 h-12 rounded-lg flex items-center justify-center mr-3 neon-border">
                            <svg class="w-6 h-6 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                        </div>
                        <h3 class="text-lg font-bold text-white">演讲嘉宾</h3>
                    </div>
                    <ul class="space-y-2 text-gray-300 text-sm" id="speaker-list">
                        <!-- 由JS动态渲染 -->
                    </ul>
                </div>

                <!-- 核心结论卡片 -->
                <div class="tech-card glow-top rounded-xl p-6">
                    <div class="flex items-center mb-4">
                        <div class="w-12 h-12 rounded-lg flex items-center justify-center mr-3 neon-border">
                            <svg class="w-6 h-6 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <h3 class="text-lg font-bold text-white">核心总结</h3>
                    </div>
                    <ul class="space-y-3 text-gray-300" id="core-summaries">
                        <!-- 由JS动态渲染 -->
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <!-- Section 2: 照片画廊 -->
    <section id="photos" class="py-16 section">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <span class="tech-tag px-4 py-1 rounded-full text-sm font-medium mb-4 inline-block">GALLERY</span>
                <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">会议照片</h2>
                <p id="photo-desc" class="text-gray-400"></p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="photo-gallery">
            </div>
        </div>
    </section>

    <!-- Section 3: 录音详情 -->
    <section id="audios" class="py-16 section">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <span class="tech-tag px-4 py-1 rounded-full text-sm font-medium mb-4 inline-block">RECORDINGS</span>
                <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">录音详情</h2>
                <p id="audio-desc" class="text-gray-400"></p>
            </div>

            <div class="space-y-6" id="audio-list">
            </div>
        </div>
    </section>

    <!-- Section 4: 核心信息看板 -->
    <section id="insights" class="py-16 section">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <span class="tech-tag px-4 py-1 rounded-full text-sm font-medium mb-4 inline-block">INSIGHTS</span>
                <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">核心信息看板</h2>
                <p class="text-gray-400">基于会议纪要提取的关键信息汇总</p>
            </div>

            <!-- 会议议题与结论 -->
            <div class="mb-12">
                <h3 class="text-2xl font-bold text-white mb-6 flex items-center">
                    <svg class="w-6 h-6 text-primary mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                    </svg>
                    会议议题与结论
                </h3>
                <div class="relative pl-8 border-l-2 border-cyan-500/30 space-y-6" id="timeline-container">
                    <!-- 由JS动态渲染 -->
                </div>
            </div>

            <!-- 发言人观点摘要 -->
            <div>
                <h3 class="text-2xl font-bold text-white mb-6 flex items-center">
                    <svg class="w-6 h-6 text-secondary mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path>
                    </svg>
                    发言人观点摘要
                </h3>
                <div class="grid md:grid-cols-2 gap-4" id="speaker-quotes">
                    <!-- 由JS动态渲染 -->
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="border-t border-cyan-500/10 py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p id="footer-text" class="text-gray-400"></p>
            <p id="footer-date" class="text-sm text-gray-500 mt-2"></p>
        </div>
    </footer>

    <!-- 灯箱 -->
    <div id="lightbox" class="lightbox">
        <button id="lightbox-close" class="absolute top-4 right-4 text-white text-4xl hover:text-primary transition-colors neon-text">&times;</button>
        <button id="lightbox-prev" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-white text-4xl hover:text-primary transition-colors neon-text">&#10094;</button>
        <img id="lightbox-img" src="" alt="" class="rounded-lg">
        <button id="lightbox-next" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-white text-4xl hover:text-primary transition-colors neon-text">&#10095;</button>
        <div id="lightbox-caption" class="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-white text-lg font-medium neon-text"></div>
    </div>

    <!-- 引入数据文件（包含所有页面数据和录音详情数据） -->
    <script src="data.js"></script>
    <script>
        let currentPhotoIndex = 0;

        // ==================== 页面初始化 ====================

        /** 渲染页面基本信息 */
        function renderPageInfo() {
            document.getElementById('page-title').textContent = pageTitle;
            document.getElementById('page-subtitle').textContent = pageSubtitle;
            document.getElementById('page-organizers').textContent = '整理人：' + organizers;
            document.getElementById('photo-desc').textContent = '共' + photos.length + '张照片，记录精彩瞬间';
            document.getElementById('audio-desc').textContent = audios.length + '个会议录音，包含完整转写和核心信息提取';
            document.getElementById('footer-text').textContent = footerText;
            document.getElementById('footer-date').textContent = footerDate;
            document.title = pageTitle + '汇报';
        }

        /** 渲染导航栏链接 */
        function renderNavLinks() {
            const container = document.getElementById('nav-links');
            container.innerHTML = navLinks.map(link =>
                `<a href="${link.href}" class="nav-link text-gray-400 hover:text-primary font-medium transition-colors">${link.label}</a>`
            ).join('');
        }

        /** 渲染元信息条（日期、地点、参会人员、录音数、照片数） */
        function renderMetaInfo() {
            const container = document.getElementById('meta-info');
            const items = [
                { icon: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z', text: meetingDate, color: 'text-primary' },
                { icon: 'M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z', text: meetingLocation, color: 'text-primary' },
                { icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z', text: attendees, color: 'text-primary' },
                { icon: 'M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z', text: audioCount, color: 'text-accent' },
                { icon: 'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z', text: photoCount, color: 'text-secondary' }
            ];
            container.innerHTML = items.map(item => `
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5 ${item.color}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${item.icon}"></path>
                    </svg>
                    <span class="font-medium">${item.text}</span>
                </div>
            `).join('');
        }

        /** 渲染会议议题列表 */
        function renderMeetingTopics() {
            const container = document.getElementById('meeting-topics');
            container.innerHTML = meetingTopics.map(topic => `
                <li class="flex items-start">
                    <span class="text-primary mr-2">◆</span>
                    <span>${topic}</span>
                </li>
            `).join('');
        }

        /** 渲染演讲嘉宾列表 */
        function renderSpeakers() {
            const container = document.getElementById('speaker-list');
            container.innerHTML = speakers.map((s, i) => `
                <li class="flex items-start">
                    <span class="text-secondary mr-2 mt-0.5 font-bold">${i + 1}.</span>
                    <div>
                        <span class="font-medium text-white">${s.name}</span>
                        <span class="text-gray-500 text-xs ml-1">${s.title}</span>
                    </div>
                </li>
            `).join('');
        }

        /** 渲染核心总结列表 */
        function renderCoreSummaries() {
            const container = document.getElementById('core-summaries');
            container.innerHTML = coreSummaries.map((item, i) => `
                <li class="flex items-start">
                    <span class="text-success mr-2 mt-1">✓</span>
                    <span>${item}</span>
                </li>
            `).join('');
        }

        /** 渲染会议议题与结论时间线 */
        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = timelineItems.map(item => `
                <div class="timeline-item relative pl-6">
                    <div class="tech-card rounded-lg p-5">
                        <h4 class="text-base font-bold text-primary mb-2">${item.title}</h4>
                        <div class="text-gray-300 mb-2">
                            <p class="mb-1 text-sm text-gray-400"><strong>讨论要点：</strong></p>
                            <ul class="list-disc list-inside space-y-1 text-sm">
                                ${item.points.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="bg-cyan-500/5 border-l-4 border-success p-3 rounded neon-border">
                            <p class="text-sm text-gray-300"><strong class="text-success">结论：</strong>${item.conclusion}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /** 渲染发言人观点摘要 */
        function renderSpeakerQuotes() {
            const container = document.getElementById('speaker-quotes');
            container.innerHTML = speakerQuotes.map(q => `
                <div class="tech-card rounded-lg p-5 glow-top">
                    <div class="flex items-center mb-3">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3 neon-border" style="background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.2));">
                            <span class="text-white font-bold text-sm">${q.avatar}</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-white text-sm">${q.name}</h4>
                            <p class="text-xs text-gray-500">${q.title}</p>
                        </div>
                    </div>
                    <p class="text-gray-300 text-sm italic mb-3">"${q.quote}"</p>
                    <a href="#audios" class="text-xs text-primary hover:text-cyan-300 font-medium transition-colors">查看录音${q.audioId} →</a>
                </div>
            `).join('');
        }

        // ==================== 照片画廊 ====================

        /** 初始化照片画廊 */
        function initPhotoGallery() {
            const gallery = document.getElementById('photo-gallery');
            photos.forEach((photo, index) => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item relative overflow-hidden cursor-pointer';
                photoItem.innerHTML = `
                    <img src="${photo}" alt="会议照片 ${index + 1}"
                         class="w-full h-48 object-cover" loading="lazy">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-3 z-10">
                        <span class="text-white text-sm font-medium">${index + 1}</span>
                    </div>
                `;
                photoItem.addEventListener('click', () => openLightbox(index));
                gallery.appendChild(photoItem);
            });
        }

        // ==================== 录音列表 ====================

        /** 将Markdown转换为HTML的简单函数 */
        function markdownToHtml(text) {
            return text
                .replace(/^### (.*$)/gim, '<h4 class="text-base font-bold text-white mt-4 mb-2">$1</h4>')
                .replace(/^## (.*$)/gim, '<h3 class="text-lg font-bold text-white mt-4 mb-2">$1</h3>')
                .replace(/^# (.*$)/gim, '<h2 class="text-xl font-bold text-white mt-4 mb-3">$1</h2>')
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-primary">$1</strong>')
                .replace(/\*(.*?)\*/g, '<em class="text-gray-400">$1</em>')
                .replace(/^- (.*$)/gim, '<li class="ml-4 text-gray-300">$1</li>')
                .replace(/\n\n/g, '</p><p class="mb-3 text-gray-300">')
                .replace(/^/gm, '<p class="mb-3 text-gray-300">')
                .replace(/$/gm, '</p>')
                .replace(/<p class="mb-3 text-gray-300"><\/p>/g, '')
                .replace(/<p class="mb-3 text-gray-300"><li/g, '<li')
                .replace(/<\/li><\/p>/g, '</li>');
        }

        /** 初始化录音列表 */
        function initAudioList() {
            const audioList = document.getElementById('audio-list');
            audios.forEach(audio => {
                const data = audioData[audio.id];
                const audioCard = document.createElement('div');
                audioCard.className = 'audio-card rounded-xl overflow-hidden';
                audioCard.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex-1">
                                <div class="flex items-center mb-2">
                                    <span class="tech-tag text-sm font-bold px-3 py-1 rounded-full mr-3">${audio.id}</span>
                                    <h3 class="text-xl font-bold text-white">${audio.title}</h3>
                                </div>
                                ${audio.speaker ? `<p class="text-sm text-gray-400 ml-12">主讲：${audio.speaker}</p>` : ''}
                            </div>
                        </div>

                        <audio controls class="w-full mb-4" preload="none">
                            <source src="${audio.file}" type="audio/mpeg">
                            您的浏览器不支持音频播放。
                        </audio>

                        <div class="space-y-3">
                            <button class="expand-btn w-full text-left px-4 py-3 rounded-lg flex items-center justify-between transition-colors" onclick="toggleSummary(${audio.id})">
                                <span class="font-medium text-gray-300">查看纪要（核心信息提取）</span>
                                <svg class="w-5 h-5 text-gray-500 transform transition-transform" id="summary-icon-${audio.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </button>
                            <div id="summary-${audio.id}" class="collapsible-content">
                                <div class="bg-cyan-500/5 rounded-lg p-4 mt-2 border border-cyan-500/10">
                                    ${data ? markdownToHtml(data.summary) : '<p class="text-gray-500">暂无内容</p>'}
                                </div>
                            </div>

                            <button class="expand-btn w-full text-left px-4 py-3 rounded-lg flex items-center justify-between transition-colors" onclick="toggleTranscript(${audio.id})">
                                <span class="font-medium text-gray-300">查看速览（完整转写）</span>
                                <svg class="w-5 h-5 text-gray-500 transform transition-transform" id="transcript-icon-${audio.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </button>
                            <div id="transcript-${audio.id}" class="collapsible-content">
                                <div class="bg-gray-800/30 rounded-lg p-4 mt-2 max-h-96 overflow-y-auto border border-gray-700/30">
                                    ${data ? markdownToHtml(data.transcript) : '<p class="text-gray-500">暂无内容</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                audioList.appendChild(audioCard);
            });
        }

        // ==================== 展开/折叠功能 ====================

        /** 切换概要显示 */
        function toggleSummary(id) {
            const content = document.getElementById(`summary-${id}`);
            const icon = document.getElementById(`summary-icon-${id}`);
            content.classList.toggle('expanded');
            icon.classList.toggle('rotate-180');
        }

        /** 切换转写显示 */
        function toggleTranscript(id) {
            const content = document.getElementById(`transcript-${id}`);
            const icon = document.getElementById(`transcript-icon-${id}`);
            content.classList.toggle('expanded');
            icon.classList.toggle('rotate-180');
        }

        // ==================== 灯箱功能 ====================

        /** 打开灯箱 */
        function openLightbox(index) {
            currentPhotoIndex = index;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');

            img.src = `${photos[index]}`;
            caption.textContent = `照片 ${index + 1} / ${photos.length}`;
            lightbox.classList.add('active');
        }

        /** 关闭灯箱 */
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }

        /** 上一张照片 */
        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            openLightbox(currentPhotoIndex);
        }

        /** 下一张照片 */
        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            openLightbox(currentPhotoIndex);
        }

        // ==================== 事件监听 ====================

        // 灯箱按钮事件
        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-prev').addEventListener('click', prevPhoto);
        document.getElementById('lightbox-next').addEventListener('click', nextPhoto);

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') prevPhoto();
                if (e.key === 'ArrowRight') nextPhoto();
            }
        });

        // 点击灯箱背景关闭
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });

        /** 导航栏滚动高亮 */
        function updateActiveNav() {
            const sections = document.querySelectorAll('section[id]');
            const navLinks = document.querySelectorAll('.nav-link');

            let current = '';
            sections.forEach(section => {
                const sectionTop = section.offsetTop - 100;
                if (window.scrollY >= sectionTop) {
                    current = section.getAttribute('id');
                }
            });

            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${current}`) {
                    link.classList.add('active');
                }
            });
        }

        /** 滚动动画 */
        function handleScrollAnimation() {
            const sections = document.querySelectorAll('.section');
            sections.forEach(section => {
                const sectionTop = section.getBoundingClientRect().top;
                const windowHeight = window.innerHeight;
                if (sectionTop < windowHeight * 0.8) {
                    section.classList.add('visible');
                }
            });
        }

        // ==================== 初始化入口 ====================

        window.addEventListener('DOMContentLoaded', () => {
            // 渲染所有数据驱动的静态内容
            renderPageInfo();
            renderNavLinks();
            renderMetaInfo();
            renderMeetingTopics();
            renderSpeakers();
            renderCoreSummaries();
            renderTimeline();
            renderSpeakerQuotes();

            // 初始化交互组件
            initPhotoGallery();
            initAudioList();
            updateActiveNav();
            handleScrollAnimation();
        });

        window.addEventListener('scroll', () => {
            updateActiveNav();
            handleScrollAnimation();
        });
    </script>
</body>
</html>
